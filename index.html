<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tasky</title>
    <link rel="icon" href="images/Tasky.png">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>
<body>

    <div class="main">
        <div class="header">
            <h1>Tasky</h1>

            <div class="progress-container">
                <div class="progress-circle" id="progressCircle">
                    <div class="inner-circle">
                        <span id="percentText">0%</span>
                    </div> 
                </div>
            </div>

        </div>

        <div class="body">
            <input class="taskInput" type="text" placeholder="Enter task to add">
            <button class="addBtn">Add task</button>
            <div class="task-stats">
                <div class="stat-box">
                    <span class="stat-label">Total</span>
                    <span class="stat-number" id="totalTasks">0</span>
                </div>
            
                <div class="stat-box">
                    <span class="stat-label">Completed</span>
                    <span class="stat-number" id="completedTasks">0</span>
                </div>
            
                <div class="stat-box">
                    <span class="stat-label">Remaining</span>
                    <span class="stat-number" id="remainingTasks">0</span>
                </div>
            </div>

            <div class="filter-buttons">
                <button class="filterBtn active" data-filter="all">All</button>
                <button class="filterBtn" data-filter="completed">Completed</button>
                <button class="filterBtn" data-filter="pending">Pending</button>
            </div>
            
            <div class="task-container"></div>
        </div>

        <div class="footer"></div>
    </div>
    
    
</body>
<script src="app.js"></script>
</html>
